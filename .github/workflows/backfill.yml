name: Backfill Missing Lottery Data

# ⚙️ Workflow นี้ใช้สำหรับดึงงวดที่ขาดหายไปทั้งหมด
# รันด้วยมือเท่านั้น (ไม่มี schedule) เพื่อป้องกัน rate limit จาก rayriffy API

on:
  workflow_dispatch:  # รันด้วยมือผ่านหน้า Actions เท่านั้น

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # ให้เวลานานพอสำหรับดึงหลายงวด

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backfill script
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python backfill_missing.py
