name: Auto Update Lottery Data

on:
  schedule:
    - cron: '30 9 1,16 * *'
  workflow_dispatch:

# กำหนดสิทธิ์ให้บอทสามารถอัปเดตไฟล์กลับเข้า Repository ได้
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run updater script
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python applotto.py

      # เพิ่มส่วนนี้: ให้บอทคุมหน้าเว็บดันกลับขึ้น GitHub
      - name: Commit and push web page changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff-index --quiet HEAD || git commit -m "Auto-updated lottery web page"
          git push
